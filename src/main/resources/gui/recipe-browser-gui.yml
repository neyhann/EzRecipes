title: "&8\u2699 Recipes"

# Number of rows (1-6)
rows: 5

# Filler (border only - top and bottom rows)
filler:
  material: "BLACK_STAINED_GLASS_PANE"
  name: " "
  lore: []
  glow: false

# Buttons
buttons:
  previous:
    slot: 36
    material: "ARROW"
    name: "&e\u25C0 Previous"
    lore:
      - "&7Page {prev}/{total}"
    glow: false

  next:
    slot: 44
    material: "ARROW"
    name: "&eNext \u25B6"
    lore:
      - "&7Page {next}/{total}"
    glow: false

# Display items
items:
  # Page indicator
  page_indicator:
    slot: 40
    material: "PAPER"
    name: "&6Page {current}/{total}"
    lore:
      - "&7Click a recipe to view it"
    glow: false

  # Empty state
  empty_state:
    slot: 22
    material: "BARRIER"
    name: "&cNo Recipes Yet"
    lore:
      - "&7Use &e/ezrecipes add &7to create one!"
    glow: false

  # Recipe display template (lore appended to recipe items)
  recipe_display:
    material: "AIR"
    name: "{item_name}"
    lore:
      - ""
      - "&8ID: {recipe_id}"
      - "&8Type: {recipe_type}"
      - ""
      - "&eClick to view"
    glow: false

  # 21 recipe slots (3 rows x 7 columns)
  recipe_1:  {slot: 10, material: "AIR", name: " ", lore: [], glow: false}
  recipe_2:  {slot: 11, material: "AIR", name: " ", lore: [], glow: false}
